<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Ultra Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Pretendard', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="p-4">

    <div class="glass w-full max-w-md p-8 text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">YouTube Downloader</h1>
        
        <div class="relative mb-4">
            <input type="text" id="url" 
                class="w-full px-5 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-400 transition" 
                placeholder="유튜브 링크를 붙여넣으세요...">
        </div>
        
        <button id="btn" onclick="getInfo()"
            class="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg hover:scale-105 transition active:scale-95">
            영상 분석 시작
        </button>

        <div id="loader" class="hidden mt-6 animate-pulse text-purple-600 font-medium">분석 중입니다...</div>
        <div id="res" class="mt-6 text-left"></div>
    </div>

    <script>
        async function getInfo() {
            const url = document.getElementById('url').value;
            const resDiv = document.getElementById('res');
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            
            if (!url) return alert('유튜브 링크를 입력해주세요.');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            resDiv.innerHTML = '';

            try {
                const API = "https://ldolado111-youdown.hf.space";
                const response = await fetch(`${API}/api/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                resDiv.innerHTML = `<h2 class="font-bold text-gray-700 mb-4 truncate">${data.title}</h2>`;
                data.video_tracks.forEach(track => {
                    resDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg mb-2 border border-gray-100 hover:border-purple-200 transition">
                            <span class="font-semibold text-gray-600">${track.resolution}</span>
                            <a href="${API}${track.download_url}" target="_blank"
                                class="text-xs bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">다운로드</a>
                        </div>`;
                });
            } catch (err) {
                resDiv.innerHTML = `<div class="text-red-500 text-sm bg-red-50 p-3 rounded-lg">에러 발생: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

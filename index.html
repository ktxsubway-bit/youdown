<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 다운로더 | 고화질 서버 연동</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #loader { display: none; margin: 15px 0; font-size: 14px; color: #666; }
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>유튜브 다운로더</h2>
    <input type="text" id="url" placeholder="유튜브 영상 링크를 입력하세요">
    <button id="btn" onclick="process()">분석 및 다운로드</button>
    <div id="loader">서버 분석 중... 잠시만 기다려주세요.</div>
    <div id="result" style="margin-top:20px;"></div>
</div>

<script>
    // 본인의 허깅페이스 스페이스 주소를 입력하세요
    const API_BASE = "https://ldolado111-youdown.hf.space/api";

    async function process() {
        const url = document.getElementById('url').value;
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');

        if (!url) return Swal.fire('알림', '링크를 먼저 입력해주세요!', 'warning');

        btn.disabled = true;
        loader.style.display = 'block';
        result.innerHTML = '';

        try {
            const res = await axios.get(`${API_BASE}/info?url=${encodeURIComponent(url)}`);
            if (!res.data.success) throw new Error(res.data.error);

            result.innerHTML = `<h3>${res.data.title}</h3>`;
            res.data.video_tracks.forEach(track => {
                result.innerHTML += `
                    <div class="track-item">
                        <span>${track.resolution} (MP4)</span>
                        <button style="width: auto; padding: 5px 10px;" onclick="download('${API_BASE.replace('/api','')}${track.download_url}')">다운로드</button>
                    </div>`;
            });
        } catch (err) {
            Swal.fire('오류 발생', '서버 연결에 실패했습니다. 허깅페이스 스페이스가 "Running" 상태인지 확인하세요.', 'error');
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function download(link) {
        window.open(link, '_blank');
    }
</script>

</body>
</html>

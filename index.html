<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Ultra Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Pretendard', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="p-4">
    <div class="glass w-full max-w-md p-8 text-center">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600 mb-6">YouTube Downloader</h1>
        <input type="text" id="url" class="w-full px-5 py-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-purple-400 transition" placeholder="유튜브 링크 입력...">
        <button id="btn" onclick="getInfo()" class="w-full mt-4 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl hover:bg-indigo-700 transition active:scale-95">영상 분석 시작</button>
        <div id="loader" class="hidden mt-6 text-indigo-600 font-bold animate-bounce">데이터를 가져오는 중...</div>
        <div id="res" class="mt-6 text-left"></div>
    </div>

    <script>
        async function getInfo() {
            const url = document.getElementById('url').value;
            const resDiv = document.getElementById('res');
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            if (!url) return alert('링크를 입력하세요.');
            btn.disabled = true; loader.classList.remove('hidden'); resDiv.innerHTML = '';
            try {
                const response = await fetch(`https://ldolado111-youdown.hf.space/api/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error);
                resDiv.innerHTML = `<h2 class="text-sm text-gray-500 mb-4 truncate">${data.title}</h2>`;
                data.video_tracks.forEach(track => {
                    resDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-100 p-4 rounded-2xl">
                            <span class="font-bold text-gray-800">${track.resolution}</span>
                            <a href="${track.download_url}" target="_blank" class="bg-green-500 text-white px-5 py-2 rounded-xl font-bold hover:bg-green-600 transition">다운로드</a>
                        </div>`;
                });
            } catch (err) { resDiv.innerHTML = `<div class="text-red-500 p-3 bg-red-50 rounded-lg text-sm">${err.message}</div>`; }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        }
    </script>
</body>
</html>
